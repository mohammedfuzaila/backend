databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    user: portfolio_user

services:
  - type: web
    name: fuzail-portfolio-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
