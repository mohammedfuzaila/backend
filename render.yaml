databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    user: portfolio_user

services:
  - type: web
    name: fuzail-portfolio-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio_backend.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --preload"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "anaikarmohammedfuzail57@gmail.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin@fuzail2025"
      - key: ALLOWED_HOSTS
        value: "backend-fuzailportfolio.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://fuzailscript.netlify.app,http://localhost:5173,http://localhost:5174,http://localhost:3000"
      - key: EMAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
